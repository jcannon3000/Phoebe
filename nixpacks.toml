[variables]
NIXPACKS_PNPM_VERSION = "10"
NIXPACKS_NO_CACHE = "1"
NIXPACKS_NODE_VERSION = "22"

[phases.install]
cmds = ["pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = ["rm -rf artifacts/mymonastery/dist artifacts/letters-app/dist", "pnpm --filter @workspace/mymonastery run build", "BASE_PATH=/mail pnpm --filter @workspace/letters-app run build", "pnpm --filter @workspace/api-server run build"]

[start]
cmd = "node ./artifacts/api-server/dist/index.mjs"
